<!DOCTYPE html>
<html lang="en">
<head>

<link rel="stylesheet" href="style.css">

<body>

<header>Sanskar Web Solutions</header>

<section class="hero">
<div>

</section>

<input id="name" placeholder="Name" required><br><br>
